name: Sync LeetCode Solutions

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    env:
      TARGET_REPO: "DSA-Leetcode-Solutions"
      SCRIPT_DIR:  "Leetcode Sync"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd "$SCRIPT_DIR"
          pip install -r requirements.txt

      - name: Create target repo if missing
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository_owner }}/$TARGET_REPO)

          if [ "$STATUS" = "404" ]; then
            echo "Repo not found — creating $TARGET_REPO ..."
            curl -s -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/user/repos \
              -d "{
                \"name\": \"$TARGET_REPO\",
                \"description\": \"My LeetCode DSA solutions — auto-synced via GitHub Actions\",
                \"private\": false,
                \"auto_init\": true
              }"
            echo "Waiting for repo to initialise..."
            sleep 5
          else
            echo "Repo already exists — skipping creation."
          fi

      - name: Clone target repo
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git clone \
            https://x-access-token:$GH_TOKEN@github.com/${{ github.repository_owner }}/$TARGET_REPO.git \
            target

      - name: Sync LeetCode solutions
        env:
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}
          LEETCODE_CSRF:    ${{ secrets.LEETCODE_CSRF }}
          OUTPUT_DIR:       target/solutions
          README_PATH:      target/README.md
        run: |
          cd "$SCRIPT_DIR"
          python sync_leetcode.py

      - name: Commit and push to target repo
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          cd target

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add solutions/ README.md

          if git diff --cached --quiet; then
            echo "No new solutions — nothing to commit."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            COUNT=$(git diff --cached --name-only | grep "meta.json" | wc -l | tr -d ' ')
            git commit -m "chore: sync ${COUNT} LeetCode solution(s) [${TIMESTAMP}]"
            git push \
              https://x-access-token:$GH_TOKEN@github.com/${{ github.repository_owner }}/$TARGET_REPO.git \
              main
          fi
